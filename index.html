<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CréaTech · Apprenez aujourd'hui, brillez demain</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal: #00d4c8;
  --gold: #f0a500;
  --dark: #050a0f;
  --dark2: #0d1e2e;
  --white: #f0f4f8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--dark); font-family: 'DM Sans', sans-serif; color: var(--white); overflow-x: hidden; }
/* ===== SPLASH ===== */
#splash {
  position: fixed; inset: 0; background: var(--dark);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999; transition: opacity 0.9s ease, visibility 0.9s ease;
}
#splash.hide { opacity: 0; visibility: hidden; pointer-events: none; }
#splash::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(0,212,200,0.07) 0%, transparent 70%),
              radial-gradient(ellipse 40% 30% at 30% 70%, rgba(240,165,0,0.05) 0%, transparent 60%);
}
.logo-wrap {
  width: 220px; height: 220px;
  animation: logoEntry 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity: 0; transform: scale(0.4) rotate(-20deg);
}
@keyframes logoEntry {
  0%   { opacity:0; transform:scale(0.4) rotate(-20deg); }
  60%  { opacity:1; transform:scale(1.08) rotate(3deg); }
  80%  { transform:scale(0.97) rotate(-1deg); }
  100% { opacity:1; transform:scale(1) rotate(0deg); }
}
.logo-svg { width:100%; height:100%; }
.hex-outer { stroke:rgba(255,255,255,0.85); stroke-width:2; fill:none; }
.hex-mid { stroke:var(--teal); stroke-width:2.5; fill:rgba(0,212,200,0.06); }
.letter-c { fill:none; stroke:var(--gold); stroke-width:12; }
/* ===== PAGE ===== */
#main-content { opacity:0; transform:translateY(30px); transition:opacity 1s ease, transform 1s ease; }

nav {
  display:flex;
  justify-content:space-between;
  padding:20px 32px;
}
.nav-logo {
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:1.3rem;
}
.hero {
  min-height:88vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.hero-title {
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:3rem;
}
.hero-sub {
  color:rgba(255,255,255,0.4);
}
</style>
</head>
<body>

<div id="splash">
  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 260 260">
      <polygon class="hex-outer" points="130,18 224,68 224,192 130,242 36,192 36,68"/>
    </svg>
  </div>
</div>
<div id="main-content">
  <nav>
    <div class="nav-logo">CREATECH</div>
  </nav>

  <section class="hero">
    <h1 class="hero-title">Apprenez aujourd'hui, brillez demain</h1>
    <p class="hero-sub">Centre de formation multidisciplinaire</p>
  </section>
<script>
setTimeout(() => {
  const s = document.getElementById("splash");
  const m = document.getElementById("main-content");
  s.classList.add("hide");
  m.classList.add("show");
}, 3000);
</script>

</body>
</html>
