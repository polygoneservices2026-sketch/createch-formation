<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CréaTech · Apprenez aujourd'hui, brillez demain</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal: #00d4c8;
  --gold: #f0a500;
  --dark: #050a0f;
  --dark2: #0d1e2e;
  --white: #f0f4f8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--dark); font-family: 'DM Sans', sans-serif; color: var(--white); overflow-x: hidden; }

/* ===== SPLASH ===== */
#splash {
  position: fixed; inset: 0; background: var(--dark);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999; transition: opacity 0.9s ease, visibility 0.9s ease;
}
#splash.hide { opacity: 0; visibility: hidden; pointer-events: none; }
#splash::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(0,212,200,0.07) 0%, transparent 70%),
              radial-gradient(ellipse 40% 30% at 30% 70%, rgba(240,165,0,0.05) 0%, transparent 60%);
}
.logo-wrap {
  width: 220px; height: 220px;
  animation: logoEntry 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity: 0; transform: scale(0.4) rotate(-20deg);
}
@keyframes logoEntry {
  0%   { opacity:0; transform:scale(0.4) rotate(-20deg); }
  60%  { opacity:1; transform:scale(1.08) rotate(3deg); }
  80%  { transform:scale(0.97) rotate(-1deg); }
  100% { opacity:1; transform:scale(1) rotate(0deg); }
}
.logo-svg { width:100%; height:100%; filter:drop-shadow(0 0 30px rgba(0,212,200,0.5)) drop-shadow(0 0 60px rgba(240,165,0,0.25)); }
.hex-outer { stroke:rgba(255,255,255,0.85); stroke-width:2; fill:none; stroke-dasharray:700; stroke-dashoffset:700; animation:drawHex 1.4s 0.3s cubic-bezier(0.4,0,0.2,1) forwards; }
@keyframes drawHex { to { stroke-dashoffset:0; } }
.hex-mid { stroke:var(--teal); stroke-width:2.5; fill:rgba(0,212,200,0.06); stroke-dasharray:560; stroke-dashoffset:560; animation:drawHex 1.2s 0.6s ease forwards; }
.letter-c { fill:none; stroke:var(--gold); stroke-width:12; stroke-linecap:round; stroke-dasharray:400; stroke-dashoffset:400; animation:drawC 1s 0.9s cubic-bezier(0.4,0,0.2,1) forwards; filter:drop-shadow(0 0 12px var(--gold)); }
.letter-c-outline { fill:none; stroke:rgba(255,255,255,0.7); stroke-width:2; stroke-linecap:round; stroke-dasharray:400; stroke-dashoffset:400; animation:drawC 1s 1.1s ease forwards; }
@keyframes drawC { to { stroke-dashoffset:0; } }
.glow-ring { fill:none; stroke:var(--teal); stroke-width:1; opacity:0; animation:glowPulse 2s 1.8s ease-in-out infinite; }
@keyframes glowPulse { 0%{opacity:0;} 50%{opacity:0.3;} 100%{opacity:0;} }
.splash-text { margin-top:28px; text-align:center; opacity:0; animation:fadeUp 0.8s 1.6s ease forwards; }
.splash-title { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(2rem,6vw,3rem); letter-spacing:0.15em; background:linear-gradient(90deg,var(--teal),var(--white),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.splash-sub { font-weight:300; font-size:0.85rem; letter-spacing:0.3em; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-top:8px; }
.progress-bar { margin-top:32px; width:160px; height:2px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; opacity:0; animation:fadeUp 0.5s 1.9s ease forwards; }
.progress-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--teal),var(--gold)); animation:fillBar 1.8s 2s cubic-bezier(0.4,0,0.2,1) forwards; }
@keyframes fillBar { to { width:100%; } }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
/* ===== PAGE ===== */
#main-content { opacity:0; transform:translateY(30px); transition:opacity 1s ease 0.3s, transform 1s ease 0.3s; min-height:100vh; }
#main-content.show { opacity:1; transform:translateY(0); }

nav { display:flex; align-items:center; justify-content:space-between; padding:20px 32px; border-bottom:1px solid rgba(255,255,255,0.06); position:sticky; top:0; z-index:100; background:rgba(5,10,15,0.92); backdrop-filter:blur(12px); }
.nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; letter-spacing:0.12em; background:linear-gradient(90deg,var(--teal),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.nav-links { display:flex; gap:28px; list-style:none; }
.nav-links a { color:rgba(255,255,255,0.45); text-decoration:none; font-size:0.8rem; letter-spacing:0.1em; text-transform:uppercase; transition:color 0.3s; }
.nav-links a:hover { color:var(--teal); }

.vacances-badge { text-align:center; background:rgba(240,165,0,0.12); padding:8px; border-bottom:1px solid rgba(240,165,0,0.25); font-size:0.72rem; letter-spacing:0.2em; color:var(--gold); }

.hero { min-height:88vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:60px 20px; position:relative; overflow:hidden; }
.hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 70% 60% at 50% 40%, rgba(0,212,200,0.07) 0%, transparent 65%); }
.hero-badge { display:inline-flex; align-items:center; gap:8px; border:1px solid rgba(0,212,200,0.3); border-radius:30px; padding:6px 18px; font-size:0.72rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--teal); margin-bottom:24px; background:rgba(0,212,200,0.05); position:relative; z-index:1; }
.hero-title { font-family:'Syne',sans-serif; font-weight:800; font-size:clamp(2.4rem,8vw,5rem); line-height:1.05; margin-bottom:16px; }
.hero-sub { font-size:clamp(0.88rem,2vw,1rem); color:rgba(255,255,255,0.4); max-width:480px; margin-bottom:40px; }
.btn-group { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }

.cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
.card { background:linear-gradient(145deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01)); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:28px 22px; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 260 260">
      <circle class="glow-ring" cx="130" cy="130" r="90"/>
      <polygon class="hex-outer" points="130,18 224,68 224,192 130,242 36,192 36,68"/>
      <polygon class="hex-mid" points="130,55 195,92 195,168 130,205 65,168 65,92"/>
      <path class="letter-c" d="M 172,100 A 52,52 0 1 0 172,160"/>
    </svg>
  </div>
  <div class="splash-text">
    <div class="splash-title">CREATECH</div>
    <div class="splash-sub">Apprenez aujourd'hui · Brillez demain</div>
  </div>
</div>

<div id="main-content">
  <nav>
    <div class="nav-logo">CREATECH</div>
  </nav>

  <section class="hero">
    <h1 class="hero-title">Apprenez aujourd'hui, brillez demain</h1>
    <p class="hero-sub">Centre de formation multidisciplinaire</p>
  </section>
<script>
const PHONE = "237677065865";

function wa(formation) {
  const msg = "Je souhaite être formé à CreaTech dans le domaine de " + formation;
  window.open("https://wa.me/" + PHONE + "?text=" + encodeURIComponent(msg), "_blank");
}

function openOverlay(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add("active");
}

function closeAll() {
  document.querySelectorAll(".overlay.active").forEach(o => o.classList.remove("active"));
}

// Splash
setTimeout(() => {
  const s = document.getElementById("splash");
  const m = document.getElementById("main-content");
  s.classList.add("hide");
  setTimeout(() => { m.classList.add("show"); s.style.display = "none"; }, 900);
}, 4200);
</script>
</body>
</html>
